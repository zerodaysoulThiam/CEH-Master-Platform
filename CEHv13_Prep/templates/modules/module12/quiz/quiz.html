{% extends "base.html" %}
{% block title %}Quiz - Module 12 {% endblock %}
{% block content %}

<meta charset="UTF-8">

<style>
    .option-label {
        display: flex;
        align-items: center;
        margin-bottom: 8px; /* espace entre chaque option */
        cursor: pointer;
    }

        .option-label input[type="radio"] {
            margin-right: 8px; /* espace entre bouton radio et texte */
        }
</style>


<div class="body-content container mt-4">

    <h1 id="quizTitle">Quiz 12 : Evading IDS, Firewalls ans honeypots</h1>

    <!-- Configuration du Quiz -->
    <div id="configContainer" class="question">
        <p><strong>Choisissez la langue :</strong></p>
        <label class="option-label">
            <input type="radio" name="langue" value="fr" checked>
            <span>Français</span>
        </label>
        <label class="option-label">
            <input type="radio" name="langue" value="en">
            <span>English</span>
        </label>

        <p><strong>Choisissez la durée du quiz :</strong></p>
        <select id="durationSelect" class="option-label">
            <option value="" disabled>-- Sélectionnez la durée --</option>
            <option value="1200">20 minutes</option>
            <option value="1800" selected>30 minutes</option>
            <option value="3600">1 heure</option>
            <option value="5400">1h 30</option>
        </select>

        <p><strong>Choisissez la difficulté :</strong></p>
        <select id="difficultySelect" class="option-label">
            <option value="" disabled selected>-- Sélectionnez la difficulté --</option>
            <option value="facile">Facile / Easy</option>
            <option value="moyen">Moyen / Medium</option>
            <option value="difficile">Difficile / Hard</option>
            <option value="tresdifficile">Très difficile / Very Hard</option>
        </select>

        <br><br>
        <button id="startQuizBtn">Commencer le quiz / Start quiz</button>
    </div>

    <!-- Minuteur -->
    <div class="timerCard" id="timerCard" style="display:none;">
        <div id="timer">00:00</div>
    </div>

    <!-- Conteneur du Quiz -->
    <div id="quizContainer" style="display:none;">
        <form id="quizForm">
            <!-- Questions seront insérées dynamiquement ici -->
        </form>

        <button id="validerBtn" onclick="corriger()">Valider le quiz / Submit quiz</button>
        <button id="restartBtn" style="display:none;" onclick="recommencer()">Recommencer / Restart</button>

        <div id="resultat"></div>
    </div>





    <script>
        // Données bilingues : les questions en fr et en en
        const quizData = {
             fr: {
                facile: [
                    "Quelle est la différence principale entre un IDS et un IPS?;L'IPS bloque activement le trafic;L'IDS est plus facile à configurer;L'IPS est moins coûteux;L'IDS nécessite moins de ressources;a;Un IPS (Système de Prévention d'Intrusion) bloque activement le trafic malveillant, tandis qu'un IDS (Système de Détection d'Intrusion) se contente de surveiller et d'alerter.",
                    "Quel type de honeypot simule des services basiques?;Low-Interaction;High-Interaction;Research;Production;a;Les honeypots Low-Interaction simulent des services et protocoles de base avec un risque minimal, tandis que les High-Interaction sont des systèmes complets.",
                    "Quelle technique utilise des fragments IP pour éviter la détection?;Fragmentation;Encodage;Chiffrement;Tunneling;a;La fragmentation IP divise les paquets en petits fragments pour contourner les systèmes de détection qui ne réassemblent pas correctement les paquets.",
                    "Quel outil est principalement utilisé pour le scan réseau et la détection de pare-feux?;Nmap;Metasploit;Wireshark;Burp Suite;a;Nmap est l'outil de référence pour le scan de ports et l'analyse réseau, avec de nombreuses options pour détecter et contourner les pare-feux.",
                    "Quelle méthode de détection IDS repose sur des modèles connus de menaces?;Signature-based;Anomaly-based;Behavior-based;Heuristic-based;a;La détection basée sur les signatures identifie les menaces connues en comparant le trafic à une base de données de modèles malveillants."
                ],
                moyen: [
                    "Quel type de tunneling utilise le protocole DNS pour exfiltrer des données?;DNS Tunneling;HTTP Tunneling;ICMP Tunneling;SSH Tunneling;a;Le DNS Tunneling encapsule des données dans des requêtes DNS pour contourner les pare-feux, car le port 53 est souvent ouvert.",
                    "Quelle technique modifie continuellement la signature d'un malware pour éviter la détection?;Polymorphisme;Chiffrement;Obfuscation;Métamorphisme;a;Le polymorphisme modifie continuellement la signature du malware tout en conservant sa fonctionnalité pour échapper aux détections basées sur les signatures.",
                    "Quel paramètre Nmap permet d'ajouter des délais entre les paquets pour éviter la détection?;--scan-delay;--delay;--timing;--slow;a;L'option --scan-delay de Nmap ajoute un délai spécifié entre chaque paquet envoyé, réduisant ainsi la détectabilité par les systèmes IDS.",
                    "Quelle caractéristique est un indicateur commun d'un honeypot?;Services avec versions inhabituelles;Trafic réseau élevé;Messages d'erreur fréquents;Performances médiocres;a;Les honeypots présentent souvent des services avec des versions inhabituelles ou obsolètes qui peuvent servir d'indicateurs de leur nature de leurre.",
                    "Quelle méthode permet de déterminer les règles d'un pare-feu par analyse?;Firewalking;Port Scanning;Packet Crafting;Traffic Analysis;a;Firewalking est une technique qui permet de déterminer les règles de filtrage d'un pare-feu en analysant les réponses aux paquets envoyés."
                ],
                difficile: [
                    "Quelle technique avancée utilise des fragments qui se chevauchent pour confondre le réassemblement IDS?;Overlapping Fragments;Session Splicing;Packet Fragmentation;Invalid Packets;a;Les fragments qui se chevauchent exploitent les différences de réassemblage entre les IDS et les systèmes cibles pour contourner la détection.",
                    "Comment les attaquants détectent-ils les honeypots basés sur le temps de réponse?;Délais artificiels constants;Absence de réponse;Réponses trop rapides;Variations aléatoires;a;Les honeypots ont souvent des temps de réponse constants et artificiels qui peuvent être détectés par des attaquants expérimentés.",
                    "Quelle solution moderne intègre la détection et la réponse pour l'ensemble de l'environnement?;XDR (Extended Detection and Response);SIEM;SOAR;EDR;a;Le XDR (Extended Detection and Response) étend les capacités de l'EDR à l'ensemble de l'environnement, fournissant une visibilité complète et une réponse intégrée.",
                    "Quelle technique utilise le protocole ICMP pour créer un tunnel de données?;ICMP Tunneling;DNS Tunneling;HTTP Tunneling;SSH Tunneling;a;L'ICMP Tunneling encapsule des données dans des paquets ICMP (comme les requêtes ping) pour contourner les pare-feux.",
                    "Quelle protection avancée permet d'inspecter le trafic chiffré SSL/TLS?;SSL Inspection;Deep Packet Inspection;Traffic Analysis;Behavior Analysis;a;L'Inspection SSL/TLS permet de déchiffrer et d'inspecter le trafic chiffré pour détecter les menaces cachées, une fonction essentielle contre les techniques d'évasion modernes."
                ]
            },
            en: {
                facile: [
                    "What is the main difference between IDS and IPS?;IPS actively blocks traffic;IDS is easier to configure;IPS is less expensive;IDS requires fewer resources;a;An IPS (Intrusion Prevention System) actively blocks malicious traffic, while an IDS (Intrusion Detection System) only monitors and alerts.",
                    "Which type of honeypot simulates basic services?;Low-Interaction;High-Interaction;Research;Production;a;Low-Interaction honeypots simulate basic services and protocols with minimal risk, while High-Interaction are complete systems.",
                    "Which technique uses IP fragments to avoid detection?;Fragmentation;Encoding;Encryption;Tunneling;a;IP fragmentation divides packets into small fragments to bypass detection systems that don't properly reassemble packets.",
                    "Which tool is primarily used for network scanning and firewall detection?;Nmap;Metasploit;Wireshark;Burp Suite;a;Nmap is the reference tool for port scanning and network analysis, with many options to detect and bypass firewalls.",
                    "Which IDS detection method relies on known threat patterns?;Signature-based;Anomaly-based;Behavior-based;Heuristic-based;a;Signature-based detection identifies known threats by comparing traffic to a database of malicious patterns."
                ],
                moyen: [
                    "Which tunneling type uses DNS protocol to exfiltrate data?;DNS Tunneling;HTTP Tunneling;ICMP Tunneling;SSH Tunneling;a;DNS Tunneling encapsulates data in DNS queries to bypass firewalls, as port 53 is often open.",
                    "Which technique continuously changes malware signature to avoid detection?;Polymorphism;Encryption;Obfuscation;Metamorphism;a;Polymorphism continuously changes the malware's signature while maintaining its functionality to evade signature-based detections.",
                    "Which Nmap parameter adds delays between packets to avoid detection?;--scan-delay;--delay;--timing;--slow;a;Nmap's --scan-delay option adds a specified delay between each sent packet, reducing detectability by IDS systems.",
                    "Which characteristic is a common indicator of a honeypot?;Services with unusual versions;High network traffic;Frequent error messages;Poor performance;a;Honeypots often feature services with unusual or outdated versions that can indicate their decoy nature.",
                    "Which method determines firewall rules through analysis?;Firewalking;Port Scanning;Packet Crafting;Traffic Analysis;a;Firewalking is a technique that determines firewall filtering rules by analyzing responses to sent packets."
                ],
                difficile: [
                    "Which advanced technique uses overlapping fragments to confuse IDS reassembly?;Overlapping Fragments;Session Splicing;Packet Fragmentation;Invalid Packets;a;Overlapping fragments exploit differences in reassembly between IDS and target systems to bypass detection.",
                    "How do attackers detect honeypots based on response time?;Constant artificial delays;No response;Too fast responses;Random variations;a;Honeypots often have constant, artificial response times that can be detected by experienced attackers.",
                    "Which modern solution integrates detection and response for the entire environment?;XDR (Extended Detection and Response);SIEM;SOAR;EDR;a;XDR (Extended Detection and Response) extends EDR capabilities to the entire environment, providing comprehensive visibility and integrated response.",
                    "Which technique uses ICMP protocol to create a data tunnel?;ICMP Tunneling;DNS Tunneling;HTTP Tunneling;SSH Tunneling;a;ICMP Tunneling encapsulates data in ICMP packets (like ping requests) to bypass firewalls.",
                    "Which advanced protection inspects SSL/TLS encrypted traffic?;SSL Inspection;Deep Packet Inspection;Traffic Analysis;Behavior Analysis;a;SSL/TLS Inspection decrypts and inspects encrypted traffic to detect hidden threats, essential against modern evasion techniques."
                ]
            }
        };

        const langueRadios = document.getElementsByName('langue');
        const durationSelect = document.getElementById('durationSelect');
        const difficultySelect = document.getElementById('difficultySelect');
        const startQuizBtn = document.getElementById('startQuizBtn');
        const quizContainer = document.getElementById('quizContainer');
        const quizForm = document.getElementById('quizForm');
        const resultatDiv = document.getElementById('resultat');
        const timerDiv = document.getElementById('timer');
        const validerBtn = document.getElementById('validerBtn');
        const restartBtn = document.getElementById('restartBtn');

        let countdownInterval;
        let tempsRestant;
        let quizEnCours = false;
        let langueChoisie = 'fr';
        let dureeChoisie = 1800; // par défaut 30 min

        // Activer sélection difficulté uniquement si durée choisie
        durationSelect.addEventListener('change', () => {
            difficultySelect.disabled = !durationSelect.value;
            verifierBoutonStart();
        });

        difficultySelect.addEventListener('change', verifierBoutonStart);

        langueRadios.forEach(radio => {
            radio.addEventListener('change', () => {
                langueChoisie = document.querySelector('input[name="langue"]:checked').value;
            });
        });

        function verifierBoutonStart() {
            startQuizBtn.disabled = !(difficultySelect.value && durationSelect.value);
        }

        startQuizBtn.addEventListener('click', () => {
            if (!difficultySelect.value || !durationSelect.value) return;

            langueChoisie = document.querySelector('input[name="langue"]:checked').value;
            dureeChoisie = parseInt(durationSelect.value, 10);

            const diff = difficultySelect.value;
            if (!quizData[langueChoisie][diff] || quizData[langueChoisie][diff].length === 0) {
                alert(langueChoisie === 'fr' ? "Aucune question disponible pour cette difficulté." : "No questions available for this difficulty.");
                return;
            }
            afficherQuestions(quizData[langueChoisie][diff]);
            quizContainer.style.display = "block";
            resultatDiv.innerHTML = "";
            document.getElementById("timerCard").style.display = "block";
            tempsRestant = dureeChoisie; // durée choisie en secondes
            afficherTimer();
            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                tempsRestant--;
                afficherTimer();
                if (tempsRestant <= 0) {
                    clearInterval(countdownInterval);
                    alert(langueChoisie === 'fr' ? "Le temps est écoulé, le quiz va être corrigé automatiquement." : "Time is up, the quiz will be corrected automatically.");
                    corriger();
                }
            }, 1000);
            quizEnCours = true;

            // Désactiver la sélection et bouton start pendant le quiz
            difficultySelect.disabled = true;
            durationSelect.disabled = true;
            langueRadios.forEach(radio => radio.disabled = true);
            startQuizBtn.disabled = true;

            validerBtn.style.display = "inline-block";
            validerBtn.disabled = false;
            restartBtn.style.display = "none";
        });

        function afficherTimer() {
            const minutes = Math.floor(tempsRestant / 60);
            const secondes = tempsRestant % 60;
            const label = langueChoisie === 'fr' ? 'T' : 'Time remaining';
            timerDiv.textContent = `${label} : ${minutes.toString().padStart(2, '0')}:${secondes.toString().padStart(2, '0')}`;
        }

        function afficherQuestions(questionsRaw) {
            quizForm.innerHTML = "";
            questionsRaw.forEach((ligne, index) => {
                const parts = ligne.split(';');
                const question = parts[0];
                const a = parts[1];
                const b = parts[2];
                const c = parts[3];
                const d = parts[4];
                const bonne = parts[5];
                const correction = parts.slice(6).join(';') || "";

                const qid = `q${index + 1}`;
                // Construire les boutons radio
                const optionsHTML = `
              <label class="option-label">
                <input type="radio" name="${qid}" value="a" />
                ${a}
              </label>
              <label class="option-label">
                <input type="radio" name="${qid}" value="b" />
                ${b}
              </label>
              <label class="option-label">
                <input type="radio" name="${qid}" value="c" />
                ${c}
              </label>
              <label class="option-label">
                <input type="radio" name="${qid}" value="d" />
                ${d}
              </label>
            `;

                const questionHTML = `
              <div class="question" id="question${index}">
                <p><strong>${index + 1}. ${question}</strong></p>
                <div class="options-container">
                  ${optionsHTML}
                </div>
                <div class="correction-text" id="correction${index}" style="display:none;"></div>
              </div>
            `;
                quizForm.insertAdjacentHTML('beforeend', questionHTML);

                // Stocker la bonne réponse et la correction en dataset
                const divQuestion = document.getElementById(`question${index}`);
                divQuestion.dataset.bonneReponse = bonne;
                divQuestion.dataset.correction = correction;
            });
        }

        function recommencer() {
            location.reload(); // recharge la page
        }

        function corriger() {
            if (!quizEnCours) return;

            clearInterval(countdownInterval);
            timerDiv.style.display = "none";

            let score = 0;
            const total = quizForm.querySelectorAll('.question').length;

            quizForm.querySelectorAll('.question').forEach((divQuestion, index) => {
                const bonneReponse = divQuestion.dataset.bonneReponse;
                const correction = divQuestion.dataset.correction;
                const qName = `q${index + 1}`;
                const radios = divQuestion.querySelectorAll(`input[name="${qName}"]`);
                let reponseUtilisateur = null;
                radios.forEach(radio => {
                    radio.disabled = true;
                    if (radio.checked) reponseUtilisateur = radio.value;
                });

                // Mettre la bonne réponse en bleu, mauvaise en rouge
                radios.forEach(radio => {
                    radio.parentElement.classList.remove('correct', 'incorrect');
                    if (radio.value === bonneReponse) {
                        radio.parentElement.classList.add('correct');
                    }
                    if (radio.checked && radio.value !== bonneReponse) {
                        radio.parentElement.classList.add('incorrect');
                    }
                });

                // Si bonne réponse, +1
                if (reponseUtilisateur === bonneReponse) score++;

                // Afficher correction texte
                const divCorrection = document.getElementById(`correction${index}`);
                divCorrection.style.display = 'block';
                divCorrection.textContent = correction;
            });

            // Afficher résultat
            const labelScore = langueChoisie === 'fr' ? "Votre score" : "Your score";
            resultatDiv.textContent = `${labelScore} : ${score} / ${total}`;

            // Masquer bouton valider, montrer bouton recommencer
            validerBtn.style.display = "none";
            restartBtn.style.display = "inline-block";

            quizEnCours = false;
        }

        function corriger() {
            if (!quizEnCours) return;

            clearInterval(countdownInterval);
            // Ne plus cacher le timer, il doit rester visible
            // timerDiv.style.display = "none"; <-- supprimer/commenter cette ligne

            let score = 0;
            const total = quizForm.querySelectorAll('.question').length;

            quizForm.querySelectorAll('.question').forEach((divQuestion, index) => {
                const bonneReponse = divQuestion.dataset.bonneReponse;
                const correction = divQuestion.dataset.correction;
                const qName = `q${index + 1}`;
                const radios = divQuestion.querySelectorAll(`input[name="${qName}"]`);
                let reponseUtilisateur = null;
                radios.forEach(radio => {
                    radio.disabled = true;
                    if (radio.checked) reponseUtilisateur = radio.value;
                });

                // Supprimer d'abord les classes pour éviter accumulation
                radios.forEach(radio => {
                    radio.parentElement.classList.remove('correct', 'incorrect');
                });

                // Ajouter classes pour bonnes et mauvaises réponses
                radios.forEach(radio => {
                    if (radio.value === bonneReponse) {
                        radio.parentElement.classList.add('correct');
                    }
                    if (radio.checked && radio.value !== bonneReponse) {
                        radio.parentElement.classList.add('incorrect');
                    }
                });

                if (reponseUtilisateur === bonneReponse) score++;

                // Afficher correction texte
                const divCorrection = document.getElementById(`correction${index}`);
                divCorrection.style.display = 'block';
                divCorrection.textContent = correction;
            });

            // Afficher résultat
            const labelScore = langueChoisie === 'fr' ? "Votre score" : "Your score";
            resultatDiv.textContent = `${labelScore} : ${score} / ${total}`;

            // Masquer bouton valider, montrer bouton recommencer
            validerBtn.style.display = "none";
            restartBtn.style.display = "inline-block";

            quizEnCours = false;
        }
        function updateTimerStyle(secondsRemaining, totalTime) {
            const ratio = secondsRemaining / totalTime;

            if (ratio > 0.5) {
                // Vert
                timerDiv.style.backgroundColor = '#28a745';
            } else if (ratio > 0.2) {
                // Jaune
                timerDiv.style.backgroundColor = '#ffc107';
                timerDiv.style.color = '#000';
            } else {
                // Rouge
                timerDiv.style.backgroundColor = '#dc3545';
                timerDiv.style.color = '#fff';
            }
        }

    </script>


</div>

{% endblock %}
